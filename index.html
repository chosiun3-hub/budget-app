<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: #f5f5f7;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    h2, h3 {
      margin-top: 0;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      background: white;
    }

    button {
      cursor: pointer;
    }

    .row-buttons {
      display: flex;
      gap: 8px;
    }

    .row-buttons button {
      flex: 1;
    }

    .category-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .category-row .category-btn {
      flex: 1;
      background: #eee;
      border: none;
    }

    .category-row .category-btn.selected {
      background: #007aff;
      color: white;
    }

    .category-row .category-delete-btn {
      width: auto;
      background: #ff9500;
      color: white;
      border: none;
      padding: 10px 12px;
      font-size: 12px;
    }

    .delete-btn {
      width: auto;
      background: red;
      color: white;
      border: none;
      padding: 8px 10px;
    }

    .item-box {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    .item-date {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .item-method {
      font-size: 12px;
      color: #444;
      margin-top: 4px;
    }

    .summary-box {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
    }

    .main-row {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub-row {
      font-size: 14px;
      color: #555;
      margin-left: 12px;
      margin-bottom: 4px;
    }

    .selected-info {
      font-size: 13px;
      color: #555;
      margin-top: 8px;
    }

    .alert {
      color: red;
      font-weight: bold;
      margin-top: 8px;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }

    .chart-wrap {
      position: relative;
      height: 300px;
    }

    .empty-chart {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>가계부</h2>

  <div class="card">
    <h3>백업 / 복구</h3>
    <div class="row-buttons">
      <button type="button" onclick="downloadBackup()">백업 다운로드</button>
      <button type="button" onclick="triggerRestore()">복구 파일 선택</button>
    </div>
    <input type="file" id="restoreFile" accept=".json" style="display:none" />
    <div class="hint">거래내역, 카테고리, 예산이 함께 저장돼.</div>
  </div>

  <div class="card">
    <h3>월별 보기</h3>
    <input type="month" id="monthFilter">
    <div class="row-buttons">
      <button type="button" onclick="setCurrentMonth()">이번 달</button>
      <button type="button" onclick="clearMonthFilter()">전체</button>
    </div>
  </div>

  <div class="card">
    <h3>예산 설정</h3>
    <input type="number" id="budgetInput" placeholder="이번 달 예산 입력">
    <button type="button" onclick="setBudget()">예산 저장</button>
    <div id="budgetInfo">예산 없음</div>
  </div>

  <div class="card">
    수입: <span id="income">0</span>원<br>
    지출: <span id="expense">0</span>원<br>
    잔액: <span id="balance">0</span>원
  </div>

  <div class="card">
    <h3>대분류 / 중분류 합계</h3>
    <div id="summaryArea"></div>
  </div>

  <div class="card">
    <h3>결제수단별 합계</h3>
    <div id="paymentSummaryArea"></div>
  </div>

  <div class="card">
    <h3>카테고리별 지출 비중</h3>
    <div class="chart-wrap">
      <canvas id="categoryPieChart"></canvas>
    </div>
    <div id="categoryPieEmpty" class="empty-chart"></div>
  </div>

  <div class="card">
    <h3>날짜별 지출</h3>
    <div class="chart-wrap">
      <canvas id="dailyBarChart"></canvas>
    </div>
    <div id="dailyBarEmpty" class="empty-chart"></div>
  </div>

  <div class="card">
    <h3>카테고리 추가</h3>
    <input id="mainInput" placeholder="대분류 (예: 생활비)">
    <input id="subInput" placeholder="중분류 (예: 식비)">
    <button type="button" onclick="addCategory()">카테고리 추가</button>
    <div class="hint">대분류가 '수입'이면 수입 카테고리로 저장돼.</div>
  </div>

  <div class="card">
    <h3>카테고리 선택 / 삭제</h3>
    <div id="categoryArea"></div>
    <div id="selectedInfo" class="selected-info">선택 안됨</div>

    <input type="number" id="amount" placeholder="금액 입력">
    <input type="date" id="date">

    <select id="paymentMethod">
      <option value="">결제수단 선택</option>
      <option value="현금">현금</option>
      <option value="신한코웨이">신한코웨이</option>
      <option value="쿠팡">쿠팡</option>
      <option value="하나생활비">하나생활비</option>
    </select>
    <div class="hint">수입은 결제수단을 선택하지 않아도 돼.</div>

    <button type="button" onclick="addTransaction()">거래 추가</button>
  </div>

  <div class="card">
    <h3>거래 내역</h3>
    <div id="list"></div>
  </div>
</div>

<script>
  let transactions = JSON.parse(localStorage.getItem("money")) || [];
  let categories = JSON.parse(localStorage.getItem("categories")) || [
    { main: "수입", sub: "급여", type: "income" },
    { main: "수입", sub: "상여", type: "income" },
    { main: "생활비", sub: "식비", type: "expense" },
    { main: "생활비", sub: "교통", type: "expense" },
    { main: "고정지출", sub: "관리비", type: "expense" },
    { main: "고정지출", sub: "통신비", type: "expense" }
  ];
  let budgets = JSON.parse(localStorage.getItem("budgets")) || {};

  let selectedCategory = null;
  let currentMonthFilter = "";
  let categoryPieChart = null;
  let dailyBarChart = null;

  function saveAll() {
    localStorage.setItem("money", JSON.stringify(transactions));
    localStorage.setItem("categories", JSON.stringify(categories));
    localStorage.setItem("budgets", JSON.stringify(budgets));
  }

  function getFilteredTransactions() {
    if (!currentMonthFilter) return transactions;
    return transactions.filter(function (t) {
      return t.date.startsWith(currentMonthFilter);
    });
  }

  function setCurrentMonth() {
    const d = new Date();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    currentMonthFilter = d.getFullYear() + "-" + m;
    document.getElementById("monthFilter").value = currentMonthFilter;
    render();
  }

  function clearMonthFilter() {
    currentMonthFilter = "";
    document.getElementById("monthFilter").value = "";
    render();
  }

  function setBudget() {
    const budget = parseInt(document.getElementById("budgetInput").value, 10);

    if (!currentMonthFilter) {
      alert("먼저 월을 선택해");
      return;
    }

    if (!budget || budget <= 0) {
      alert("예산을 입력해");
      return;
    }

    budgets[currentMonthFilter] = budget;
    document.getElementById("budgetInput").value = "";
    saveAll();
    render();
  }

  function addCategory() {
    const main = document.getElementById("mainInput").value.trim();
    const sub = document.getElementById("subInput").value.trim();

    if (!main || !sub) {
      alert("대분류/중분류 입력해");
      return;
    }

    const exists = categories.some(function (cat) {
      return cat.main === main && cat.sub === sub;
    });

    if (exists) {
      alert("이미 있는 카테고리야");
      return;
    }

    const newCategory = {
      main: main,
      sub: sub,
      type: main === "수입" ? "income" : "expense"
    };

    categories.push(newCategory);
    selectedCategory = newCategory;

    document.getElementById("mainInput").value = "";
    document.getElementById("subInput").value = "";

    saveAll();
    renderCategories();
  }

  function deleteCategory(main, sub) {
    const ok = confirm(main + " > " + sub + " 카테고리를 삭제할까?");
    if (!ok) return;

    categories = categories.filter(function (cat) {
      return !(cat.main === main && cat.sub === sub);
    });

    if (
      selectedCategory &&
      selectedCategory.main === main &&
      selectedCategory.sub === sub
    ) {
      selectedCategory = null;
      document.getElementById("selectedInfo").innerText = "선택 안됨";
    }

    saveAll();
    renderCategories();
  }

  function renderCategories() {
    const area = document.getElementById("categoryArea");
    area.innerHTML = "";

    categories.forEach(function (cat) {
      const row = document.createElement("div");
      row.className = "category-row";

      const btn = document.createElement("button");
      btn.className = "category-btn";
      btn.textContent = cat.main + " > " + cat.sub;

      if (
        selectedCategory &&
        selectedCategory.main === cat.main &&
        selectedCategory.sub === cat.sub
      ) {
        btn.classList.add("selected");
      }

      btn.onclick = function () {
        selectedCategory = cat;
        document.getElementById("selectedInfo").innerText =
          "선택: " + cat.main + " > " + cat.sub;
        renderCategories();
      };

      const del = document.createElement("button");
      del.className = "category-delete-btn";
      del.textContent = "삭제";
      del.onclick = function () {
        deleteCategory(cat.main, cat.sub);
      };

      row.appendChild(btn);
      row.appendChild(del);
      area.appendChild(row);
    });
  }

  function addTransaction() {
    const amount = parseInt(document.getElementById("amount").value, 10);
    const date = document.getElementById("date").value;
    const payment = document.getElementById("paymentMethod").value;

    if (!selectedCategory || !amount || !date) {
      alert("카테고리, 금액, 날짜를 입력해");
      return;
    }

    if (selectedCategory.type === "expense" && !payment) {
      alert("지출은 결제수단을 선택해야 해");
      return;
    }

    transactions.push({
      id: Date.now(),
      main: selectedCategory.main,
      sub: selectedCategory.sub,
      type: selectedCategory.type,
      amount: amount,
      date: date,
      payment: selectedCategory.type === "income" ? "-" : payment
    });

    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
    document.getElementById("paymentMethod").value = "";

    saveAll();
    render();
  }

  function deleteItem(id) {
    transactions = transactions.filter(function (t) {
      return t.id !== id;
    });
    saveAll();
    render();
  }

  function renderBudget(filteredTransactions) {
    const budgetInfo = document.getElementById("budgetInfo");
    const expense = filteredTransactions
      .filter(function (t) {
        return t.type === "expense";
      })
      .reduce(function (sum, t) {
        return sum + t.amount;
      }, 0);

    const budget = currentMonthFilter ? (budgets[currentMonthFilter] || 0) : 0;

    if (!currentMonthFilter) {
      budgetInfo.innerHTML = "월을 선택하면 예산을 볼 수 있어";
      return;
    }

    if (!budget) {
      budgetInfo.innerHTML = "예산 없음";
      return;
    }

    const remain = budget - expense;

    budgetInfo.innerHTML =
      "예산: " + budget + "원<br>" +
      "사용: " + expense + "원<br>" +
      "남은: " + remain + "원" +
      (remain < 0 ? '<div class="alert">⚠️ 예산 초과</div>' : "");
  }

  function renderSummary(filteredTransactions) {
    const area = document.getElementById("summaryArea");
    area.innerHTML = "";

    if (filteredTransactions.length === 0) {
      area.innerHTML = "<div>해당 월의 합계가 없어</div>";
      return;
    }

    const grouped = {};

    filteredTransactions.forEach(function (t) {
      if (!grouped[t.main]) grouped[t.main] = {};
      if (!grouped[t.main][t.sub]) grouped[t.main][t.sub] = 0;
      grouped[t.main][t.sub] += t.amount;
    });

    Object.keys(grouped).sort().forEach(function (main) {
      const box = document.createElement("div");
      box.className = "summary-box";

      let total = 0;
      Object.values(grouped[main]).forEach(function (v) {
        total += v;
      });

      const mainDiv = document.createElement("div");
      mainDiv.className = "main-row";
      mainDiv.textContent = main + ": " + total + "원";
      box.appendChild(mainDiv);

      Object.keys(grouped[main]).sort().forEach(function (sub) {
        const subDiv = document.createElement("div");
        subDiv.className = "sub-row";
        subDiv.textContent = sub + ": " + grouped[main][sub] + "원";
        box.appendChild(subDiv);
      });

      area.appendChild(box);
    });
  }

  function renderPaymentSummary(filteredTransactions) {
    const area = document.getElementById("paymentSummaryArea");
    area.innerHTML = "";

    const expenseOnly = filteredTransactions.filter(function (t) {
      return t.type === "expense";
    });

    if (expenseOnly.length === 0) {
      area.innerHTML = "<div>지출 내역 없음</div>";
      return;
    }

    const paymentMap = {};

    expenseOnly.forEach(function (t) {
      if (!paymentMap[t.payment]) paymentMap[t.payment] = 0;
      paymentMap[t.payment] += t.amount;
    });

    Object.keys(paymentMap).sort().forEach(function (payment) {
      const div = document.createElement("div");
      div.className = "summary-box";
      div.innerHTML = "<b>" + payment + "</b> : " + paymentMap[payment] + "원";
      area.appendChild(div);
    });
  }

  function renderCategoryPieChart(filteredTransactions) {
    const expenseOnly = filteredTransactions.filter(function (t) {
      return t.type === "expense";
    });

    const emptyDiv = document.getElementById("categoryPieEmpty");
    const canvas = document.getElementById("categoryPieChart");

    if (categoryPieChart) {
      categoryPieChart.destroy();
      categoryPieChart = null;
    }

    if (expenseOnly.length === 0) {
      emptyDiv.innerText = "지출 내역이 없어";
      return;
    }

    emptyDiv.innerText = "";

    const map = {};
    expenseOnly.forEach(function (t) {
      const key = t.main + " > " + t.sub;
      if (!map[key]) map[key] = 0;
      map[key] += t.amount;
    });

    const labels = Object.keys(map);
    const values = Object.values(map);

    categoryPieChart = new Chart(canvas, {
      type: "pie",
      data: {
        labels: labels,
        datasets: [{
          data: values
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });
  }

  function renderDailyBarChart(filteredTransactions) {
    const expenseOnly = filteredTransactions.filter(function (t) {
      return t.type === "expense";
    });

    const emptyDiv = document.getElementById("dailyBarEmpty");
    const canvas = document.getElementById("dailyBarChart");

    if (dailyBarChart) {
      dailyBarChart.destroy();
      dailyBarChart = null;
    }

    if (expenseOnly.length === 0) {
      emptyDiv.innerText = "지출 내역이 없어";
      return;
    }

    emptyDiv.innerText = "";

    const map = {};
    expenseOnly.forEach(function (t) {
      if (!map[t.date]) map[t.date] = 0;
      map[t.date] += t.amount;
    });

    const labels = Object.keys(map).sort();
    const values = labels.map(function (date) {
      return map[date];
    });

    dailyBarChart = new Chart(canvas, {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "일자별 지출",
          data: values
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
  }

  function renderList(filteredTransactions) {
    const area = document.getElementById("list");
    area.innerHTML = "";

    const sorted = filteredTransactions.slice().sort(function (a, b) {
      return b.date.localeCompare(a.date);
    });

    if (sorted.length === 0) {
      area.innerHTML = "<div>해당 월의 내역이 없어</div>";
      return;
    }

    sorted.forEach(function (t) {
      const div = document.createElement("div");
      div.className = "item-box";

      div.innerHTML =
        "<div>" +
        t.main + " > " + t.sub + " | " + t.amount + "원 " +
        '<button class="delete-btn" onclick="deleteItem(' + t.id + ')">삭제</button>' +
        "</div>" +
        '<div class="item-date">' + t.date + "</div>" +
        '<div class="item-method">결제수단: ' + t.payment + "</div>";

      area.appendChild(div);
    });
  }

  function render() {
    const filteredTransactions = getFilteredTransactions();

    let income = 0;
    let expense = 0;

    filteredTransactions.forEach(function (t) {
      if (t.type === "income") income += t.amount;
      else expense += t.amount;
    });

    document.getElementById("income").innerText = income;
    document.getElementById("expense").innerText = expense;
    document.getElementById("balance").innerText = income - expense;

    renderBudget(filteredTransactions);
    renderSummary(filteredTransactions);
    renderPaymentSummary(filteredTransactions);
    renderCategoryPieChart(filteredTransactions);
    renderDailyBarChart(filteredTransactions);
    renderList(filteredTransactions);
  }

  function downloadBackup() {
    const backupData = {
      transactions: transactions,
      categories: categories,
      budgets: budgets,
      exportedAt: new Date().toISOString()
    };

    const blob = new Blob(
      [JSON.stringify(backupData, null, 2)],
      { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const today = new Date().toISOString().slice(0, 10);

    a.href = url;
    a.download = "budget-backup-" + today + ".json";
    a.click();

    URL.revokeObjectURL(url);
  }

  function triggerRestore() {
    document.getElementById("restoreFile").click();
  }

  function restoreBackup(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
      try {
        const parsed = JSON.parse(e.target.result);

        if (!parsed.transactions || !parsed.categories || !parsed.budgets) {
          alert("올바른 백업 파일이 아니야");
          return;
        }

        const ok = confirm("현재 데이터를 덮어쓰고 복구할까?");
        if (!ok) return;

        transactions = parsed.transactions;
        categories = parsed.categories;
        budgets = parsed.budgets;
        selectedCategory = null;

        saveAll();
        renderCategories();
        render();

        alert("복구 완료");
      } catch (error) {
        alert("복구 실패: 파일 형식 확인해줘");
      } finally {
        event.target.value = "";
      }
    };

    reader.readAsText(file);
  }

  document.getElementById("monthFilter").addEventListener("change", function (e) {
    currentMonthFilter = e.target.value;
    render();
  });

  document.getElementById("restoreFile").addEventListener("change", restoreBackup);

  renderCategories();
  setCurrentMonth();
</script>

</body>
</html>
